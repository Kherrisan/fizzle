[package]
name = "fizzle"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
env_logger = "0.11"
libc = "0.2"
log = "0.4"
fxhash = "0.2"
heapless = "0.8"
toml = "0.8"
fizzle-plugin = { version = "0.1", path = "../fizzle-plugin" }

