[package]
name = "fizzle"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]


[build-dependencies]
proc-macro2 = { version = "1.0" }
quote = { version = "1.0" }
serde = { version = "1.0", features = ["derive"] }
syn = { version = "2.0" }
toml = "0.8"

[dependencies]
env_logger = "0.11"
fizzle-common = { version = "0.1", path = "../fizzle-common" }
fizzle-plugin = { version = "0.1", path = "../fizzle-plugin" }
fxhash = "0.2"
heapless = "0.8"
libc = "0.2"
log = "0.4"
toml = "0.8"


# Start of Fizzle Plugin Dependencies

# Examples:
# 
# fizzle-http = "0.1"
# fizzle-yaml = "0.2.0"
# fizzle-zmq-client = "0.4.2"
